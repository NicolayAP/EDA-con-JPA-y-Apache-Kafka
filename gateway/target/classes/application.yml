server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: customer-service
          uri: http://edakafka:8080
          predicates:
            - Path=/customer/**
        - id: login-service
          uri: http://edakafka:8080
          predicates:
            - Path=/api/logins/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
